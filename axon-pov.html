<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AXON — POV</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Sora:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ═════ SECTION A — LOCKED PALETTE (never deviate) ═════ */
  :root{
    --far:#00DC50; --mid:#FF8C00; --near:#FF1A1A;
    --blue:#1464EB; --violet:#8B5CF6; --cyangrid:#00FFFF;
    --hud:#E8F4FD; --panel:#0D1117; --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#000;font-family:'Outfit',sans-serif;color:var(--hud);}
  .mono{ font-family:'JetBrains Mono',monospace; }

  #world{ position:fixed; inset:0; overflow:hidden; background:#000; }
  #world.shake{ animation:camShake 6s ease-in-out infinite; }
  @keyframes camShake{ 0%,100%{transform:translate(0,0)} 30%{transform:translate(1px,-.8px)} 60%{transform:translate(-1px,1px)} 80%{transform:translate(.7px,.6px)} }
  #world.lurch{ animation:lurch .22s ease-out 1; }
  @keyframes lurch{ 0%{transform:translate(0,0)} 40%{transform:translate(0,7px) scale(1.012)} 100%{transform:translate(0,0)} }

  /* ═════ POV VIEW / ENVIRONMENTS ═════ */
  #view{ position:absolute; inset:0; opacity:0; transition:opacity .5s ease; }
  #view.on{ opacity:1; }
  .env{ position:absolute; inset:0; transition:opacity .6s ease, filter .6s ease; }
  .sky{ position:absolute; left:0; right:0; top:0; height:46%; }
  .floor{ position:absolute; left:0; right:0; bottom:0; top:46%; overflow:hidden; }
  /* perspective ground grid (cyan @25%) */
  .grid{ position:absolute; left:-50%; right:-50%; top:0; bottom:-10%;
    background:
      repeating-linear-gradient(90deg, #00FFFF40 0 1px, transparent 1px 8%),
      repeating-linear-gradient(0deg, #00FFFF40 0 1px, transparent 1px 58px);
    transform:perspective(560px) rotateX(60deg); transform-origin:50% 0;
    opacity:0; animation:gridrun 2.4s linear infinite; }
  #view.lit .grid{ opacity:.25; }
  @keyframes gridrun{ from{background-position:0 0,0 0} to{background-position:0 0,0 58px} }

  /* environment skins */
  /* dark, moody environments (Deus Ex / Ghost in the Shell) so neon pops */
  .stage-mall   .sky{ background:linear-gradient(180deg,#161b22,#1f2630 70%,#283039); }
  .stage-mall   .floor{ background:linear-gradient(180deg,#12161d 0%,#1b212a 55%,#232b35 100%); }
  .stage-park   .sky{ background:linear-gradient(180deg,#1b1f25,#22272e 60%,#282e36); filter:saturate(.6); }
  .stage-park   .floor{ background:linear-gradient(180deg,#15181d 0%,#1d2127 100%); }
  .stage-night  .sky{ background:linear-gradient(180deg,#04060a,#070b12 70%,#0a1018); }
  .stage-night  .floor{ background:linear-gradient(180deg,#070a10 0%,#0b0f16 100%); }
  .stage-dusk   .sky{ background:linear-gradient(180deg,#15110c,#241a10 55%,#3a2a17); filter:saturate(.4); }
  .stage-dusk   .floor{ background:linear-gradient(180deg,#14110d 0%,#1d1813 100%); }
  /* night: streetlight pools */
  .stage-night .floor::before{ content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 22% 40%, #2a2c2208 0%, transparent 18%),
              radial-gradient(circle at 74% 30%, #2a2c2208 0%, transparent 16%); }
  /* mall fluorescent + marble sheen */
  .stage-mall .floor::before{ content:''; position:absolute; left:20%; right:20%; top:0; height:40%;
    background:linear-gradient(180deg,#ffffff14,transparent); filter:blur(10px); }

  /* ═════ CORRIDOR + ZONES (Section A colors) ═════ */
  #corridor{ position:absolute; left:50%; bottom:3%; transform:translateX(-50%);
    width:min(48%,660px); height:60%; z-index:6; pointer-events:none; opacity:0;
    clip-path:polygon(40% 0, 60% 0, 100% 100%, 0 100%);
    display:flex; flex-direction:column; filter:drop-shadow(0 0 14px #1464EB55);
    border-left:2px solid var(--blue); border-right:2px solid var(--blue);
    transition:opacity .4s ease; }
  #corridor.draw{ opacity:1; animation:corridorIgnite .4s ease-out both; }
  @keyframes corridorIgnite{ 0%{ transform:translateX(-50%) scaleY(.02); opacity:0; } 100%{ transform:translateX(-50%) scaleY(1); opacity:1; } }
  .stage-mall #corridor{ -webkit-box-reflect: below 0px linear-gradient(transparent 58%, #ffffff2e); }

  .zone{ position:relative; border-top:1px solid #FFFFFF99; }
  .zone.zf{ flex:0 0 38%; } .zone.zm{ flex:0 0 32%; } .zone.zn{ flex:0 0 30%; }
  .zfill{ position:absolute; inset:0; opacity:0; }
  .zf .zfill{ background:var(--far);  animation:brF 2s ease-in-out infinite; }
  .zm .zfill{ background:var(--mid);  animation:brM 2s ease-in-out infinite .25s; }
  .zn .zfill{ background:var(--near); animation:brN 2s ease-in-out infinite .5s; }
  @keyframes brF{ 0%,100%{opacity:.08} 50%{opacity:.16} }
  @keyframes brM{ 0%,100%{opacity:.08} 50%{opacity:.16} }
  @keyframes brN{ 0%,100%{opacity:.10} 50%{opacity:.18} }
  .zone.active .zfill{ animation:none; opacity:.65; }           /* instant, no ease-in */
  .zone.exhale .zfill{ animation:none; opacity:.10; transition:opacity .7s ease; }
  .zdiv{ position:absolute; left:0; right:0; top:-1px; height:2px; background:#FFFFFF; opacity:0; }
  .zone.flash .zdiv{ animation:divFlash .25s steps(1) 3; }
  @keyframes divFlash{ 0%{opacity:.9} 50%{opacity:0} }
  .zlabel{ position:absolute; right:6%; top:50%; transform:translateY(-50%);
    font-family:'JetBrains Mono',monospace; font-size:clamp(8px,.85vw,11px); font-weight:700;
    letter-spacing:2px; color:var(--hud); opacity:.5; }

  /* ═════ DETECTION OBJECTS ═════ */
  #objs{ position:absolute; left:0; right:0; top:18%; bottom:3%; z-index:9; pointer-events:none; }
  .obj{ position:absolute; left:50%; top:0; width:130px; --bc:var(--violet);
    transform:translate(-50%,0) scale(.5); opacity:0; }
  .obj.show{ opacity:1; }
  .objart{ width:100%; filter:drop-shadow(0 8px 10px #00000066); }
  .objart svg{ display:block; width:100%; overflow:visible; }

  .dbox{ position:absolute; inset:-6% -10%; border:1px solid var(--bc); border-radius:4px;
    box-shadow:none; transition:border-color .3s, box-shadow .3s, border-width .1s; }
  .obj.far  { --bc:var(--far); }  .obj.mid{ --bc:var(--mid); }  .obj.near{ --bc:var(--near); }
  .obj.far  .dbox{ border-width:3px; box-shadow:0 0 16px #00DC5066, inset 0 0 12px #00DC5026; }
  .obj.mid  .dbox{ border-width:3px; box-shadow:0 0 16px #FF8C0077, inset 0 0 12px #FF8C0026; }
  .obj.near .dbox{ border-width:3px; box-shadow:0 0 24px #FF1A1Aaa, inset 0 0 14px #FF1A1A33; }

  /* L-bracket lock-on (fly from center → snap) */
  .brk{ position:absolute; width:18px; height:18px; opacity:0; }
  .brk.tl{ top:-3px; left:-3px;  border-top:3px solid var(--bc); border-left:3px solid var(--bc); }
  .brk.tr{ top:-3px; right:-3px; border-top:3px solid var(--bc); border-right:3px solid var(--bc); }
  .brk.bl{ bottom:-3px; left:-3px;  border-bottom:3px solid var(--bc); border-left:3px solid var(--bc); }
  .brk.br{ bottom:-3px; right:-3px; border-bottom:3px solid var(--bc); border-right:3px solid var(--bc); }
  .obj.lock .brk{ animation-duration:.42s; animation-timing-function:cubic-bezier(.2,.8,.2,1.5); animation-fill-mode:both; }
  .obj.lock .brk.tl{ animation-name:brkTL; } .obj.lock .brk.tr{ animation-name:brkTR; }
  .obj.lock .brk.bl{ animation-name:brkBL; } .obj.lock .brk.br{ animation-name:brkBR; }
  @keyframes brkTL{ 0%{opacity:0;transform:translate(34px,34px) scale(.4)} 55%{opacity:1} 100%{opacity:1;transform:translate(0,0) scale(1)} }
  @keyframes brkTR{ 0%{opacity:0;transform:translate(-34px,34px) scale(.4)} 55%{opacity:1} 100%{opacity:1;transform:translate(0,0) scale(1)} }
  @keyframes brkBL{ 0%{opacity:0;transform:translate(34px,-34px) scale(.4)} 55%{opacity:1} 100%{opacity:1;transform:translate(0,0) scale(1)} }
  @keyframes brkBR{ 0%{opacity:0;transform:translate(-34px,-34px) scale(.4)} 55%{opacity:1} 100%{opacity:1;transform:translate(0,0) scale(1)} }
  .obj.settled .brk{ opacity:1; }

  .dring{ position:absolute; inset:-8px; border:2px dashed var(--bc); border-radius:5px; opacity:0; }
  .obj.mid .dring, .obj.near .dring{ opacity:.85; animation:dashSpin 7s linear infinite; }
  @keyframes dashSpin{ to{ transform:rotate(360deg) } }
  .oring{ position:absolute; inset:-15px; border:2px solid #FF1A1A66; border-radius:7px; opacity:0; }
  .obj.near .oring{ opacity:1; animation:oringPulse .7s ease-in-out infinite; }
  @keyframes oringPulse{ 0%,100%{ transform:scale(1); opacity:.5 } 50%{ transform:scale(1.06); opacity:.9 } }

  .dlabel{ position:absolute; top:-25px; left:-10%; white-space:nowrap;
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.5px;
    color:var(--hud); background:#0D1117cc; padding:2px 7px; border-radius:3px;
    border:1px solid var(--bc); opacity:0; transition:border-color .3s; }
  .obj.settled .dlabel, .obj.far .dlabel, .obj.mid .dlabel, .obj.near .dlabel{ opacity:1; }
  .dlabel .arrow{ color:var(--bc); }

  /* vehicle wireframe silhouette */
  .wire{ position:absolute; inset:-6% -10%; opacity:0; }
  .wire svg{ width:100%; height:100%; overflow:visible; }
  .wire path,.wire line,.wire circle,.wire polyline{ stroke:var(--mid); stroke-width:1.6; fill:none;
    filter:drop-shadow(0 0 5px var(--mid)); }
  .obj.wirefire .wire{ animation:wireFire .4s ease-out forwards; }
  @keyframes wireFire{ 0%{opacity:0; transform:scale(1.18)} 30%{opacity:1} 80%{opacity:1; transform:scale(1.02)} 100%{opacity:0; transform:scale(1)} }

  /* dustbin red neon X-cross */
  .xcross{ position:absolute; inset:-10% -4%; opacity:0; }
  .xcross::before,.xcross::after{ content:''; position:absolute; top:50%; left:-4%; width:108%; height:4px;
    background:var(--near); box-shadow:0 0 8px 1px #FF1A1A80; border-radius:2px; transform-origin:center; }
  .xcross::before{ transform:translateY(-50%) rotate(38deg); }
  .xcross::after{  transform:translateY(-50%) rotate(-38deg); }
  .obj.xon .xcross{ opacity:1; animation:xpulse .5s ease-in-out infinite; }
  @keyframes xpulse{ 0%,100%{ filter:brightness(1) } 50%{ filter:brightness(1.6) } }

  /* ═════ SCREEN NEAR PULSE ═════ */
  #pulse{ position:fixed; inset:0; z-index:40; pointer-events:none; opacity:0; background:#FF1A1A; }
  #pulse.go{ animation:scrPulse .066s steps(1) 1; }
  @keyframes scrPulse{ 0%{opacity:.30} 100%{opacity:0} }

  /* ═════ HUD CHROME ═════ */
  .fcorner{ position:fixed; width:34px; height:34px; z-index:30; opacity:0; transition:opacity .6s; }
  #view.on ~ .optics .fcorner, .fcorner.in{ opacity:.55; }
  .fcorner.tl{ top:18px; left:18px; border-top:2px solid #1464EB; border-left:2px solid #1464EB; }
  .fcorner.tr{ top:18px; right:18px; border-top:2px solid #1464EB; border-right:2px solid #1464EB; }
  .fcorner.bl{ bottom:18px; left:18px; border-bottom:2px solid #1464EB; border-left:2px solid #1464EB; }
  .fcorner.br{ bottom:18px; right:18px; border-bottom:2px solid #1464EB; border-right:2px solid #1464EB; }

  #stats{ position:fixed; top:calc(20px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    z-index:31; display:flex; gap:18px; padding:7px 18px; border-radius:6px;
    background:#0D1117bb; border:1px solid #1464EB55; font-family:'JetBrains Mono',monospace;
    font-size:12px; font-weight:600; letter-spacing:1px; color:var(--hud); opacity:0; transition:opacity .5s;
    box-shadow:0 0 14px #1464EB22; backdrop-filter:blur(4px); }
  #stats.in{ opacity:1; }
  #stats b{ color:var(--blue); }
  #stats .sysok{ color:var(--far); }
  #cleared{ position:fixed; top:calc(58px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    z-index:31; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1.5px;
    color:var(--far); opacity:0; }
  #cleared.flash{ animation:clrFlash 1.4s ease both; }
  @keyframes clrFlash{ 0%{opacity:0;transform:translate(-50%,-6px)} 15%{opacity:1;transform:translate(-50%,0)} 80%{opacity:1} 100%{opacity:0} }

  #statBR{ position:fixed; right:26px; bottom:calc(22px + env(safe-area-inset-bottom)); z-index:31;
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:1px; color:#9fc7ee; opacity:0; transition:opacity .5s; }
  #statBR.in{ opacity:1; }
  #statBR .sysok{ color:var(--far); animation:okpulse 1.8s ease-in-out infinite; }
  @keyframes okpulse{ 0%,100%{text-shadow:0 0 6px #00DC5066} 50%{text-shadow:0 0 16px #00DC50} }

  /* TTS subtitle / waveform */
  #ttsbar{ position:fixed; left:50%; bottom:calc(7% + env(safe-area-inset-bottom)); transform:translate(-50%,12px);
    z-index:33; display:flex; align-items:center; gap:14px; padding:11px 22px; border-radius:10px;
    background:#0D1117dd; border:1px solid #1464EB44; opacity:0; transition:opacity .3s, transform .3s;
    backdrop-filter:blur(6px); box-shadow:0 12px 36px #000a; }
  #ttsbar.in{ opacity:1; transform:translate(-50%,0); }
  #ttsbar.warn{ border-color:#FF1A1A66; box-shadow:0 12px 36px #000a, 0 0 20px #FF1A1A33; }
  .wave{ display:flex; gap:3px; align-items:center; height:20px; }
  .wave i{ width:3px; height:6px; border-radius:2px; background:var(--blue); opacity:.2; }
  #ttsbar.in .wave i{ background:var(--far); opacity:1; animation:wv .6s ease-in-out infinite; }
  #ttsbar.warn .wave i{ background:var(--near); }
  .wave i:nth-child(2){animation-delay:.1s}.wave i:nth-child(3){animation-delay:.2s}.wave i:nth-child(4){animation-delay:.3s}.wave i:nth-child(5){animation-delay:.4s}
  @keyframes wv{ 0%,100%{height:6px} 50%{height:18px} }
  #ttstext{ font-size:clamp(13px,1.3vw,17px); font-weight:600; color:var(--hud); }
  #ttstext.warn{ color:#ff8a9c; }

  /* ═════ SCENE 1 — BOOT ═════ */
  #boot{ position:absolute; inset:0; z-index:50; background:#000; }
  #scan{ position:absolute; left:0; right:0; top:-4px; height:2px; background:#fff;
    box-shadow:0 0 40px 8px #ffffffcc; opacity:0; }
  #scan.go{ animation:scanDown 1s linear forwards; }
  @keyframes scanDown{ 0%{opacity:1; top:-4px} 100%{opacity:1; top:100%} }
  #gridghost{ position:absolute; inset:0; opacity:0;
    background:repeating-linear-gradient(90deg,#1464EB 0 1px,transparent 1px 7%),
              repeating-linear-gradient(0deg,#1464EB 0 1px,transparent 1px 46px); }
  #gridghost.on{ opacity:.05; }
  #glasses{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; }
  #glasses.on{ opacity:1; }
  #glasses svg{ width:min(80vw,900px); }
  #glasses .gp{ stroke:#fff; stroke-width:2; fill:none; stroke-dasharray:1400; stroke-dashoffset:1400; }
  #glasses.draw .gp{ animation:gdraw 1.5s ease forwards; }
  @keyframes gdraw{ to{ stroke-dashoffset:0 } }
  #glasses.solid .gp{ stroke-dashoffset:0; stroke:#161a20; fill:#0c0f14; filter:drop-shadow(0 0 1px #2a2f38); }
  #term{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:51;
    font-family:'JetBrains Mono',monospace; font-size:clamp(11px,1.5vw,16px); line-height:1.65;
    color:#fff; white-space:pre; opacity:0; text-shadow:0 0 8px #ffffff44; }
  #term.on{ opacity:1; }
  #term .ok{ color:var(--far); } #term .sa{ font-weight:700; }
  #term .sa.pulse{ animation:saPulse .3s steps(1) 6; }
  @keyframes saPulse{ 0%{color:#fff} 50%{color:var(--far)} 100%{color:var(--far)} }

  /* ═════ SCENE 6 — SUMMARY PANEL + END CARD ═════ */
  #summary{ position:fixed; right:6%; top:50%; transform:translate(120%,-50%); z-index:34;
    width:min(420px,80vw); padding:22px 26px; border-radius:8px;
    background:#0D1117eb; border:1px solid var(--blue); box-shadow:0 0 12px #1464EB4d;
    font-family:'JetBrains Mono',monospace; font-size:clamp(11px,1.15vw,14px); line-height:1.85;
    color:var(--hud); white-space:pre; opacity:0; }
  #summary.in{ opacity:1; transform:translate(0,-50%); transition:transform .5s ease, opacity .5s ease; }
  #summary.out{ opacity:0; transition:opacity .8s ease; }
  #summary .ok{ color:var(--far); font-weight:700; }
  #summary .hl{ color:var(--blue); }

  #endcard{ position:fixed; inset:0; z-index:55; background:#000; opacity:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; pointer-events:none; }
  #endcard.on{ opacity:1; transition:opacity 1s ease; }
  #endcard svg{ width:120px; height:auto; }
  #endcard .hex{ stroke:var(--blue); stroke-width:3; fill:none; stroke-dasharray:560; stroke-dashoffset:560;
    filter:drop-shadow(0 0 10px #1464EBaa); }
  #endcard.draw .hex{ animation:gdraw .8s ease forwards, hexPulse 2s ease-in-out infinite 1s; }
  @keyframes hexPulse{ 0%,100%{filter:drop-shadow(0 0 8px #1464EB88)} 50%{filter:drop-shadow(0 0 20px #1464EBdd)} }
  #endcard .et{ text-align:center; opacity:0; transition:opacity 1.2s ease; }
  #endcard.txt .et{ opacity:1; }
  #endcard .et .nm{ font-family:'Sora',sans-serif; font-weight:900; letter-spacing:.22em;
    font-size:clamp(40px,7vw,90px); color:var(--hud); text-shadow:0 0 30px #1464EB55; }
  #endcard .et .sub{ font-family:'Outfit',sans-serif; font-weight:300; font-size:clamp(13px,1.5vw,19px);
    color:#9fc7ee; margin-top:10px; letter-spacing:.04em; }
  #endcard .et .tech{ font-family:'JetBrains Mono',monospace; font-size:clamp(10px,1.05vw,13px);
    color:#5f7f9e; letter-spacing:2px; margin-top:18px; }

  /* ═════ OPTICS (glasses POV) ═════ */
  .optics{ position:fixed; inset:0; z-index:60; pointer-events:none; }
  .vignette{ position:absolute; inset:0; background:radial-gradient(ellipse at 50% 48%, transparent 50%, #00000055 82%, #000000c0 100%); }
  .scanlines{ position:absolute; inset:0; background:repeating-linear-gradient(0deg,#ffffff08 0 1px,transparent 1px 3px); opacity:.4; }
  .barrel{ position:absolute; inset:0; box-shadow:inset 0 0 120px 30px #00000066; border-radius:36px; }

  /* ═════ CONTROLS / ENTRY ═════ */
  .ctl{ position:fixed; top:calc(18px + env(safe-area-inset-top)); right:18px; z-index:70;
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:1px; color:#9fc7ee;
    background:#0D1117cc; border:1px solid #1464EB44; border-radius:8px; padding:8px 13px; cursor:pointer;
    backdrop-filter:blur(8px); transition:all .2s; user-select:none; opacity:.55; }
  .ctl:hover{ opacity:1; border-color:#1464EB; }
  .esc-hint{ position:fixed; bottom:calc(13px + env(safe-area-inset-bottom)); left:18px; z-index:62;
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; color:#3c4a56; }
  @media (pointer:coarse){ .esc-hint{ display:none; } .ctl{ opacity:.85; padding:11px 15px; } }

  #entry{ position:fixed; inset:0; z-index:200; cursor:pointer; background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px;
    transition:opacity .9s ease; }
  #entry.gone{ opacity:0; pointer-events:none; }
  #entry .e-brand{ font-family:'Sora',sans-serif; font-weight:900; letter-spacing:.12em;
    font-size:clamp(64px,12vw,160px); color:var(--hud); text-shadow:0 0 40px #1464EB66;
    animation:eb 4s ease-in-out infinite; }
  @keyframes eb{ 0%,100%{text-shadow:0 0 26px #1464EB44} 50%{text-shadow:0 0 56px #1464EB99} }
  #entry .e-sub{ font-family:'JetBrains Mono',monospace; letter-spacing:.42em; text-transform:uppercase;
    font-size:clamp(10px,1.3vw,14px); color:#5f7f9e; margin-top:-10px; }
  #entry .e-btn{ display:flex; align-items:center; gap:13px; padding:16px 38px; border-radius:100px;
    border:1px solid #1464EB66; background:#0a0f17; color:var(--hud); font-family:'Outfit',sans-serif;
    font-weight:600; font-size:clamp(15px,1.6vw,18px); letter-spacing:.5px; cursor:pointer;
    box-shadow:0 0 24px #1464EB22, 0 18px 50px #000c; animation:bf 2.4s ease-in-out infinite; }
  @keyframes bf{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  #entry .e-play{ width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px #1464EB99; }
  #entry .e-play svg{ fill:#fff; width:12px; height:12px; margin-left:2px; }
  #entry .e-note{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px; color:#3c4a56; }
</style>
</head>
<body>

<!-- ENTRY -->
<div id="entry">
  <div class="e-brand">AXON</div>
  <div class="e-sub">Spatial Intelligence · POV</div>
  <button class="e-btn"><span class="e-play"><svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg></span> Begin</button>
  <div class="e-note">FULLSCREEN + SOUND · 2:00 · LOOPS</div>
</div>

<div id="world">

<script>
'use strict';
const $=id=>document.getElementById(id);
const world=$('world'), view=$('view'), env=$('env'), corridor=$('corridor'), objs=$('objs');
const boot=$('boot'), scan=$('scan'), gridghost=$('gridghost'), glasses=$('glasses'), term=$('term');
const pulse=$('pulse'), stats=$('stats'), statBR=$('statBR'), cleared=$('cleared');
const ttsbar=$('ttsbar'), ttstext=$('ttstext'), summary=$('summary'), endcard=$('endcard');
const trksEl=$('trks'), alrtEl=$('alrt');
const Z={ far:corridor.querySelector('.zf'), mid:corridor.querySelector('.zm'), near:corridor.querySelector('.zn') };
const fcorners=[...document.querySelectorAll('.fcorner')];

// ════════ TIMERS / STATE ════════
let running=false, startT=0, lastT=1e9, timers=[], ivls=[];
const fired=new Set();
const live={};                       // id -> obj element
let alrt=0, trks=0;
function after(s,fn){ const id=setTimeout(fn,s*1000); timers.push(id); return id; }
function every(ms,fn){ const id=setInterval(fn,ms); ivls.push(id); return id; }
function clearTimers(){ timers.forEach(clearTimeout); timers=[]; ivls.forEach(clearInterval); ivls=[]; }

function setStage(name){ view.className='on lit'; env.parentElement; world.classList.add('shake');
  view.classList.remove('stage-mall','stage-park','stage-night','stage-dusk'); view.classList.add('stage-'+name); }

function resetCycle(){
  clearTimers(); fired.clear();
  Object.keys(live).forEach(k=>{ live[k].remove(); delete live[k]; });
  objs.innerHTML='';
  alrt=0; trks=0; alrtEl.textContent='0'; trksEl.textContent='0';
  // boot
  boot.style.display='block'; boot.style.opacity='1';
  scan.classList.remove('go'); gridghost.classList.remove('on');
  glasses.classList.remove('on','draw','solid'); term.classList.remove('on'); term.innerHTML='';
  // view/env
  view.className=''; view.classList.remove('on','lit'); view.style.opacity='';
  view.classList.remove('stage-mall','stage-park','stage-night','stage-dusk');
  world.classList.remove('shake','lurch');
  corridor.classList.remove('draw'); corridor.style.opacity='0';
  ['far','mid','near'].forEach(z=>Z[z].classList.remove('active','exhale','flash'));
  // hud
  stats.classList.remove('in'); statBR.classList.remove('in'); cleared.classList.remove('flash');
  ttsbar.classList.remove('in','warn'); ttstext.textContent=''; ttstext.classList.remove('warn');
  fcorners.forEach(c=>c.classList.remove('in'));
  summary.classList.remove('in','out'); summary.innerHTML='';
  endcard.classList.remove('on','draw','txt');
  pulse.classList.remove('go');
  stopDrone();
  if('speechSynthesis' in window) speechSynthesis.cancel();
}

// ════════ AUDIO (Section C verbatim) ════════
let actx=null, master=null, muted=false, droneNodes=[], footIv=null;
const g=db=>Math.pow(10, db/20);                       // dB → linear
function audioInit(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext; actx=new AC();
    master=actx.createGain(); master.gain.value=muted?0:1; master.connect(actx.destination);
  }catch(e){ actx=null; }
}
// generic envelope tone
function blip(freq, dur, gain, type, when, atk, opts){
  if(!actx||muted) return;
  opts=opts||{}; const t=(when??actx.currentTime);
  const o=actx.createOscillator(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
  let node=o; if(opts.lpf){ const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=opts.lpf; o.connect(f); node=f; }
  const gn=actx.createGain(); gn.gain.setValueAtTime(0.0001,t);
  gn.gain.linearRampToValueAtTime(gain,t+(atk??0.005));
  gn.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  node.connect(gn); gn.connect(master); o.start(t); o.stop(t+dur+0.03);
}
function twoNote(f1,f2,each,gain,type,desc){
  if(!actx||muted) return; const t=actx.currentTime;
  const a=desc?f2:f1, b=desc?f1:f2;
  blip(a,each/1000+0.04,gain,type||'sine',t,0.006);
  blip(b,each/1000+0.04,gain,type||'sine',t+each/1000,0.006);
}
function doubleBeep(gain){                              // square 2000Hz, 80ms×2, 50ms gap
  if(!actx||muted) return; const t=actx.currentTime;
  blip(2000,0.08,gain,'square',t,0.002);
  blip(2000,0.08,gain,'square',t+0.13,0.002);
}
function clickTone(freq,dur,gain){ blip(freq,dur,gain,'square',actx?actx.currentTime:0,0.001); }
const SFX={
  bootScan:()=> blip(880,0.30,g(-12),'sine',actx.currentTime,0.01),
  arpeggio:()=>{ if(!actx||muted) return;
    const pent=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25]; const step=0.6, t0=actx.currentTime;
    pent.forEach((f,i)=> blip(f,0.5,g(-8),'sawtooth',t0+i*step,0.01,{lpf:800})); },
  awaken:()=>{ if(!actx||muted) return; const t=actx.currentTime;
    [554.37,739.99,932.33].forEach(f=> blip(f,0.41,g(-6),'sawtooth',t,0.01)); },
  foot:()=> clickTone(2000,0.005,g(-18)),
  snap:()=> clickTone(2500,0.02,g(-10)),
  zoneFar:()=> twoNote(493.88,622.25,80,g(-12)),       // B4→D#5
  zoneMid:()=> twoNote(440.00,554.37,80,g(-12)),       // A4→C#5
  zoneNear:()=>twoNote(392.00,493.88,80,g(-12)),       // G4→B4
  zoneClear:(z)=>{ const m={far:[622.25,493.88],mid:[554.37,440],near:[493.88,392]}[z]||[622.25,493.88];
    twoNote(m[0],m[1],80,g(-14)); },
  preChime:()=> twoNote(493.88,659.25,100,g(-14)),     // B4→E5
  beepFar:()=> doubleBeep(g(-20)),
  beepMid:()=> doubleBeep(g(-14)),
  beepNear:()=>doubleBeep(g(-8)),
  thump:()=> blip(120,0.05,g(-6),'sine',actx.currentTime,0.003),
  allClear:()=> twoNote(659.25,493.88,300,g(-14),'sine',true), // E5→B4 desc
  termClick:()=> clickTone(1500,0.008,g(-20)),
  endTone:()=>{ if(!actx||muted) return; const t=actx.currentTime;
    const o=actx.createOscillator(); o.type='sine'; o.frequency.value=440;
    const gn=actx.createGain(); gn.gain.setValueAtTime(0.0001,t);
    gn.gain.linearRampToValueAtTime(g(-10),t+0.2); gn.gain.setValueAtTime(g(-10),t+0.7);
    gn.gain.exponentialRampToValueAtTime(0.0008,t+1.3);
    o.connect(gn); gn.connect(master); o.start(t); o.stop(t+1.4); }
};
function startDrone(){                                  // 38Hz + 76Hz sine, -24dB, continuous
  if(!actx||muted||droneNodes.length) return; const t=actx.currentTime;
  [38,76].forEach((f,i)=>{ const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f;
    const gn=actx.createGain(); gn.gain.setValueAtTime(0.0001,t); gn.gain.linearRampToValueAtTime(g(-24)/(i+1),t+1.2);
    o.connect(gn); gn.connect(master); o.start(t); droneNodes.push({o,gn}); });
}
function stopDrone(){ if(!actx) { droneNodes=[]; return; }
  droneNodes.forEach(({o,gn})=>{ try{ gn.gain.linearRampToValueAtTime(0.0001,actx.currentTime+0.4); o.stop(actx.currentTime+0.5);}catch(e){} });
  droneNodes=[]; }
function startFoot(){ stopFoot(); footIv=setInterval(()=>SFX.foot(),520); ivls.push(footIv); }
function stopFoot(){ if(footIv){ clearInterval(footIv); footIv=null; } }

// ════════ VOICE ════════
let voice=null;
function pickVoice(){ try{ const vs=speechSynthesis.getVoices();
  voice=vs.find(v=>/Samantha|Google US English|Karen|Moira|Tessa|Victoria|Ava/i.test(v.name))
      ||vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith('en'))||vs[0]||null; }catch(e){} }
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text,opts){ opts=opts||{};
  if(!('speechSynthesis' in window)||muted) return;
  const u=new SpeechSynthesisUtterance(text); if(voice) u.voice=voice;
  u.rate=opts.rate||1; u.pitch=opts.pitch||1;
  try{ speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){}
}
// pre-chime + zone double-beep + subtitle + TTS, all per brief
function tts(text, zone, warn){
  SFX.preChime();
  after(0.1, ()=>{
    ({far:SFX.beepFar, mid:SFX.beepMid, near:SFX.beepNear}[zone]||SFX.beepMid)();
    ttstext.textContent=text; ttstext.classList.toggle('warn',!!warn);
    ttsbar.classList.toggle('warn',!!warn); ttsbar.classList.add('in');
    speak(text);
    after(2.6,()=>ttsbar.classList.remove('in'));
  });
  bumpAlrt();
}
function bumpAlrt(){ alrt++; alrtEl.textContent=alrt; }
function setTrks(n){ trks=n; trksEl.textContent=n; }

// ════════ ZONES ════════
function zoneActivate(z){ Z[z].classList.remove('exhale'); Z[z].classList.add('active');
  ({far:SFX.zoneFar, mid:SFX.zoneMid, near:SFX.zoneNear}[z])(); }
function zoneFlash(z){ Z[z].classList.add('flash'); after(0.8,()=>Z[z].classList.remove('flash')); }
function zoneIdle(z,clearTone){ Z[z].classList.remove('active'); Z[z].classList.add('exhale');
  after(0.75,()=>Z[z].classList.remove('exhale')); if(clearTone) SFX.zoneClear(z); }
function exhaleAll(){ ['far','mid','near'].forEach(z=>zoneIdle(z,false)); }

// ════════ DETECTION OBJECTS ════════
const ART={
  wet:`<svg viewBox="0 0 120 150"><polygon points="60,12 104,138 16,138" fill="#FFC400" stroke="#caa000" stroke-width="3"/><rect x="50" y="118" width="20" height="22" fill="#222"/><text x="60" y="70" font-family="Outfit" font-size="34" font-weight="800" fill="#222" text-anchor="middle">!</text><rect x="14" y="138" width="92" height="8" rx="3" fill="#caa000"/></svg>`,
  suv:`<svg viewBox="0 0 220 130"><rect x="12" y="58" width="196" height="46" rx="13" fill="#1c2433"/><path d="M44 60 q16 -34 54 -34 l52 0 q30 0 44 34 z" fill="#232c3d"/><rect x="60" y="34" width="80" height="26" rx="5" fill="#0c1018"/><circle cx="60" cy="106" r="17" fill="#0a0a0c"/><circle cx="162" cy="106" r="17" fill="#0a0a0c"/><circle cx="60" cy="106" r="6" fill="#333"/><circle cx="162" cy="106" r="6" fill="#333"/></svg>`,
  suvLights:`<svg viewBox="0 0 220 130"><rect x="12" y="58" width="196" height="46" rx="13" fill="#1c2433"/><path d="M44 60 q16 -34 54 -34 l52 0 q30 0 44 34 z" fill="#232c3d"/><rect x="60" y="34" width="80" height="26" rx="5" fill="#0c1018"/><circle cx="60" cy="106" r="17" fill="#0a0a0c"/><circle cx="162" cy="106" r="17" fill="#0a0a0c"/><rect x="196" y="70" width="14" height="12" rx="3" fill="#fff7d6"/><rect x="196" y="70" width="14" height="12" rx="3" fill="#fff7d6" opacity=".6"/></svg>`,
  bin:`<svg viewBox="0 0 90 150"><rect x="16" y="30" width="58" height="108" rx="7" fill="#586069"/><rect x="12" y="22" width="66" height="14" rx="5" fill="#3f454d"/><line x1="30" y1="44" x2="30" y2="128" stroke="#444b53" stroke-width="3"/><line x1="45" y1="44" x2="45" y2="128" stroke="#444b53" stroke-width="3"/><line x1="60" y1="44" x2="60" y2="128" stroke="#444b53" stroke-width="3"/><circle cx="26" cy="142" r="7" fill="#222"/><circle cx="64" cy="142" r="7" fill="#222"/></svg>`,
  crosswalk:`<svg viewBox="0 0 260 70"><g fill="#eef3f6">${[6,42,78,114,150,186,222].map(x=>`<rect x="${x}" y="8" width="22" height="54" rx="2"/>`).join('')}</g></svg>`
};
const WIRE_SUV=`<svg viewBox="0 0 220 130" preserveAspectRatio="none"><path d="M12 100 L12 70 Q12 58 26 58 L44 58 Q60 24 98 24 L150 24 Q180 24 196 58 L208 58 Q210 60 210 70 L210 100"/><line x1="44" y1="58" x2="170" y2="58"/><line x1="98" y1="24" x2="92" y2="58"/><line x1="150" y1="24" x2="156" y2="58"/><circle cx="60" cy="104" r="17"/><circle cx="162" cy="104" r="17"/><path d="M12 100 L208 100"/></svg>`;

function spawn(id, name, conf, artKey, opts){
  opts=opts||{};
  const o=document.createElement('div'); o.className='obj'; o.style.width=(opts.w||130)+'px';
  o.dataset.conf=conf; o.dataset.name=name; o.dataset.id=id;
  o.innerHTML =
    `<div class="objart">${ART[artKey]}</div>`+
    (opts.wire?`<div class="wire">${WIRE_SUV}</div>`:'')+
    (opts.xcross?`<div class="xcross"></div>`:'')+
    `<div class="dbox"></div>`+
    `<span class="brk tl"></span><span class="brk tr"></span><span class="brk bl"></span><span class="brk br"></span>`+
    `<div class="dring"></div><div class="oring"></div>`+
    `<div class="dlabel"></div>`;
  objs.appendChild(o); live[id]=o;
  place(o, opts.from||'translate(-50%,0) scale(.45)', 0);
  requestAnimationFrame(()=>o.classList.add('show'));
  updateLabel(o, null);
  return o;
}
function place(o, transform, dur){ o.style.transition = dur? `transform ${dur}s linear` : 'none';
  // force reflow when switching to none→value
  void o.offsetWidth; o.style.transform=transform; }
function lockOn(o){ o.classList.add('lock'); SFX.snap;
  after(0.30,()=>SFX.snap()); after(0.45,()=>{ o.classList.remove('lock'); o.classList.add('settled'); }); }
function zoneClass(o,z){ o.classList.remove('far','mid','near'); if(z) o.classList.add(z); updateLabel(o,z); }
function updateLabel(o, z){ const el=o.querySelector('.dlabel'); const c=o.dataset.conf;
  const arrow = o.dataset.arrow? ` <span class="arrow">↑</span>`:'';
  const zt = z? `&nbsp;&nbsp;${z.toUpperCase()}`:'';
  el.innerHTML=`${o.dataset.name} #${o.dataset.id}&nbsp;&nbsp;${c}%${zt}${arrow}`; }
function degrade(o){ o.classList.remove('near','mid','far'); o.classList.add('mid'); // brief: red→violet→fade
  after(0.0,()=>{ o.classList.remove('mid'); o.querySelector('.dbox').style.borderColor='var(--violet)'; o.style.setProperty('--bc','var(--violet)'); });
  after(0.5,()=>{ o.style.transition='opacity .4s'; o.style.opacity='0'; });
  after(0.95,()=>{ o.remove(); for(const k in live) if(live[k]===o) delete live[k]; }); }

function screenPulse(){ pulse.classList.remove('go'); void pulse.offsetWidth; pulse.classList.add('go');
  SFX.thump(); world.classList.add('lurch'); after(0.25,()=>world.classList.remove('lurch')); }

// confidence flicker ±2% (persistent — survives resetCycle, reads the live map each tick)
setInterval(()=>{ for(const k in live){ const o=live[k]; const base=+o.dataset.base||+o.dataset.conf;
  o.dataset.base=base; const v=Math.max(0,Math.min(99, base + (Math.random()*4-2)|0));
  o.dataset.conf=v; updateLabel(o, (o.classList.contains('near')&&'near')||(o.classList.contains('mid')&&'mid')||(o.classList.contains('far')&&'far')||null); } });

// ════════ BOOT TYPING ════════
const BOOT_LINES=[
  'AXON SPATIAL ASSISTANT v1.0','',
  '[INIT] YOLOv12-Small weights..........OK',
  '[INIT] ByteTrack tracker...............OK',
  '[INIT] Apple MPS acceleration.........OK',
  '[INIT] TTS priority engine............OK',
  '[INIT] Corridor geometry..............OK',
  '[INIT] Zone thresholds (FAR/MID/NEAR).OK',
  '','SYSTEM ACTIVE — ALL SYSTEMS GO'
];
function typeBoot(){
  term.classList.add('on'); term.innerHTML=''; let li=0, ci=0; const buf=[];
  function step(){
    if(li>=BOOT_LINES.length) return;
    const line=BOOT_LINES[li];
    if(ci===0) buf.push('');
    if(ci<line.length){ buf[buf.length-1]+=line[ci]; ci++; if(line[ci-1]!==' ') SFX.termClick();
      render(); timers.push(setTimeout(step,18)); }
    else { li++; ci=0; render(); timers.push(setTimeout(step, line===''?40:90)); }
  }
  function render(){ term.innerHTML=buf.map(l=>{
    l=l.replace(/OK$/,'<span class="ok">OK</span>');
    if(l.startsWith('SYSTEM ACTIVE')) l=`<span class="sa">${l}</span>`;
    return l; }).join('\n'); }
  step();
}

// ════════ THE TIMELINE (Section B) ════════
const TOTAL=120.5, LOOP=123.5;
const E=[];
const ev=(t,fn)=>E.push({t,fn});

/* ---- SCENE 1 BOOT 0–18 ---- */
ev(1.2, ()=>{ scan.classList.add('go'); SFX.bootScan(); });
ev(2.2, ()=>{ gridghost.classList.add('on'); });
ev(3.0, ()=>{ glasses.classList.add('on','draw'); });
ev(4.5, ()=>{ glasses.classList.add('solid'); });
ev(6.0, ()=>{ typeBoot(); SFX.arpeggio(); });
ev(13.0,()=>{ const sa=term.querySelector('.sa'); if(sa) sa.classList.add('pulse'); });
ev(14.0,()=>{ // world snap
  boot.style.transition='opacity .25s'; boot.style.opacity='0'; after(0.3,()=>boot.style.display='none');
  setStage('mall'); corridor.classList.add('draw');
  stats.classList.add('in'); statBR.classList.add('in'); fcorners.forEach(c=>c.classList.add('in'));
  SFX.awaken(); });
ev(14.05,()=>zoneFlash('far')); ev(14.1,()=>{}); ev(14.2,()=>{});
ev(14.5,()=>{ startDrone(); startFoot(); });

/* ---- SCENE 2 WET FLOOR (mall marble) 18–40 ---- */
ev(22.0,()=>{ const o=spawn('03','wet_floor_sign',82,'wet',{w:95,from:'translate(-210%,18px) scale(.5)'}); o.dataset.base=82; lockOn(o); });
ev(25.0,()=>{ const o=live['03']; zoneClass(o,'far'); place(o,'translate(-50%,6vh) scale(.6)',2.4); zoneActivate('far'); zoneFlash('far'); setTrks(1); });
ev(27.9,()=>SFX.preChime());
ev(28.0,()=>{ ttstext.textContent='Wet floor sign ahead.'; ttsbar.classList.add('in'); SFX.beepFar; speak('Wet floor sign ahead.'); bumpAlrt(); after(2.6,()=>ttsbar.classList.remove('in')); });
ev(30.0,()=>{ const o=live['03']; zoneClass(o,'mid'); place(o,'translate(-50%,24vh) scale(1.0)',3.6); zoneIdle('far',false); zoneActivate('mid'); });
ev(33.9,()=>SFX.beepNear());
ev(34.0,()=>{ const o=live['03']; zoneClass(o,'near'); place(o,'translate(-50%,38vh) scale(1.5)',3.8); zoneActivate('near'); screenPulse(); tts('Caution, wet surface!','near',true); });
ev(36.0,()=>{ const o=live['03']; place(o,'translate(-150%,44vh) scale(1.7)',2.0); });
ev(38.0,()=>{ const o=live['03']; if(o) degrade(o); });
ev(38.8,()=>exhaleAll());
ev(39.0,()=>SFX.allClear());

/* ---- SCENE 3 VEHICLE (parking concrete) 40–65 ---- */
ev(40.0,()=>{ setStage('park'); });
ev(43.0,()=>{ const o=spawn('07','vehicle',91,'suv',{w:170,wire:true,from:'translate(-50%,2vh) scale(.4)'}); o.dataset.base=91; o.dataset.arrow='1'; lockOn(o); });
ev(43.3,()=>{ const o=live['07']; zoneClass(o,'far'); place(o,'translate(-50%,7vh) scale(.6)',3.4); zoneActivate('far'); zoneFlash('far'); setTrks(1); });

E.sort((a,b)=>a.t-b.t);

// ════════ FRAME LOOP ════════
function frame(now){
  if(!running) return;
  const t=((now-startT)/1000)%LOOP;
  if(t<lastT) resetCycle();
  lastT=t;
  for(let i=0;i<E.length;i++){ if(t>=E[i].t && !fired.has(i)){ fired.add(i); try{E[i].fn();}catch(e){console.error('event',i,E[i].t,e);} } }
  requestAnimationFrame(frame);
}

// ════════ CONTROLS ════════
const entry=$('entry');
function begin(opts){ opts=opts||{};
  entry.classList.add('gone');
  if(opts.silent) entry.style.display='none';   // deep-link: no fade artifact in screenshots
  if(!opts.silent){ audioInit();
    if(matchMedia('(pointer:coarse)').matches && 'speechSynthesis' in window){ try{ speechSynthesis.speak(new SpeechSynthesisUtterance(' ')); }catch(e){} }
    const de=document.documentElement; if(de.requestFullscreen) de.requestFullscreen().catch(()=>{}); else if(de.webkitRequestFullscreen) de.webkitRequestFullscreen();
  } else { audioInit(); }
  running=true; startT=performance.now()-(opts.offset||0)*1000; lastT=1e9; resetCycle();
  requestAnimationFrame(frame);
}
entry.addEventListener('click',()=>begin());
$('muteBtn').addEventListener('click',e=>{ e.stopPropagation(); muted=!muted;
  if(master&&actx) master.gain.linearRampToValueAtTime(muted?0:1, actx.currentTime+0.2);
  if(muted){ stopDrone(); if('speechSynthesis' in window) speechSynthesis.cancel(); }
  e.currentTarget.textContent=muted?'♪ MUTED':'♪ SOUND ON'; });
document.addEventListener('keydown',e=>{ if(e.key==='r'||e.key==='R'){ startT=performance.now(); lastT=1e9; resetCycle(); } });

// deep-link ?t=SEC (muted, no fullscreen) for verification
const tp=new URLSearchParams(location.search).get('t');
if(tp!==null){ muted=true; begin({silent:true, offset:Math.max(0,parseFloat(tp)||0)}); }
